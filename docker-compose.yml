services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saludario
      POSTGRES_USER: saludario
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      target: runtime
    depends_on:
      - db
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src

volumes:
  pgdata:
